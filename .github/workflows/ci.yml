name: GTAngelEcho CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run reservoir ESN demo
        run: python src/reservoir/esn.py
        
      - name: Run cognitive memory demo
        run: python src/cognitive/memory.py
        
      - name: Run MLGamer training (short)
        run: python src/mlgamer/trainer.py --episodes 10
        
      - name: Run property coherence assessment
        run: python scripts/property_coherence.py --all
